<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Alpha Bot Platform</title>
    <!--
      SPA fallback para GitHub Pages.
      Estrategia: codificamos el path en el query string y redirigimos a la
      raíz. El index.html lo decodifica antes de montar React Router.

      pathSegmentsToKeep:
        - 1 → repo desplegado en https://USER.github.io/REPO/  (lo más común)
        - 0 → dominio propio o repo USER.github.io
      Si tu repo es USER.github.io/REPO, deja 1. Si usas dominio propio
      o el repo se llama USER.github.io, cambia a 0.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
