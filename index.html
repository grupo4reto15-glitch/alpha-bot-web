<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>Alpha Bot Platform</title>

    <!--
      Runtime config: define window.__BOT_API__ con la URL del bot.
      Editable POST-BUILD (en GitHub Pages: edita /config.js directamente).
      Path RELATIVO ("./") para que funcione bajo cualquier base path.
    -->
    <script src="./config.js"></script>

    <!--
      SPA routing en GitHub Pages: si el navegador llega a /argos directo,
      GitHub responde 404.html. Ese 404.html redirige a / con la ruta en
      query, y este script abajo restaura la URL real ANTES de que React
      monte el router. Truco estándar: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(
            null, null, l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Fuentes: Space Grotesk para UI, JetBrains Mono para código/datos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
