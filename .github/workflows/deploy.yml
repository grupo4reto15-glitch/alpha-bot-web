# Deploy automático del frontend a GitHub Pages.
#
# Cómo funciona:
#   - Cada push a `main` dispara el workflow.
#   - Se hace `npm ci` + `npm run build` con VITE_BASE='/${REPO_NAME}/'
#     para que los assets se sirvan correctamente desde la URL pública
#     https://${USER}.github.io/${REPO_NAME}/.
#   - El contenido de `dist/` se publica en la branch `gh-pages` (o
#     directo al artifact de Pages, si así está configurado el repo).
#
# Requisitos en GitHub:
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Settings → Actions → General → Workflow permissions:
#      "Read and write permissions" (para que pueda publicar Pages).
#
# Si tu repo está en un dominio propio o se llama USER.github.io,
# cambia VITE_BASE a '/' y en public/404.html pon pathSegmentsToKeep=0.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # Vite usará esto como `base`. El nombre del repo viene como
          # 'USER/REPO' en GITHUB_REPOSITORY; nos quedamos con REPO.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
